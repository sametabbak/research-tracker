name: Auto Categorize Analyses

# Bu action sadece manuel olarak (butonla) tetiklenecek
on:
  workflow_dispatch:

jobs:
  categorize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Categorizer Script
        run: python auto_categorizer.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/keywords.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-categorized new analyses" && git push)
