name: Sanitize Analysis Names

on:
  # Runs automatically after the tracker workflow completes
  workflow_run:
    workflows: ["Research Center Price Tracker"]
    types: [completed]

  # Also runnable manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sanitize:
    runs-on: ubuntu-latest

    # Only run if the tracker succeeded (skip if tracker itself failed)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sanitizer
        run: python sanitize.py

      - name: Commit cleaned files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/analyses/
          git add data/keywords.json

          if git diff --staged --quiet; then
            echo "No changes to commit — all names already clean."
          else
            git commit -m "chore: sanitize special characters in analysis names"
            git push
          fi
